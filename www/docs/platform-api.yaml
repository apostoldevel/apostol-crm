components:
  parameters:
    document:
      in: path
      name: document
      description: Document entity
      required: true
      schema:
        type: string
        enum: [account, card, caster, client, company, customer, device, employee, identity, invoice, job, message, network, order, partner, payment, price, product, report_ready, station, subscription, tariff, task, transaction]
    reference:
      in: path
      name: reference
      description: Reference entity
      required: true
      schema:
        type: string
        enum: [address, agent, calendar, category, country, currency, form, format, measure, model, navigation, program, property, reference, region, report, report_form, report_routine, report_tree, scheduler, service, vendor, version]
    resultObject:
      in: query
      name: result_object
      required: false
      schema:
        type: string
        enum: [true, false]
      description: Wrap the result in a JSON-object named "result".
    resultFormat:
      in: query
      name: result_format
      required: false
      schema:
        type: string
        enum: [object, array, null]
      description: >
        All endpoints are returned: JSON-object or JSON-array depending on the number of entries in the response.
        You can change this behavior with this setting.
