openapi: 3.0.0
info:
  description: |
    Apostol CRM API.

    This specification covers all platform and configuration REST endpoints.
    For detailed documentation, see the [Wiki](https://github.com/apostoldevel/db-platform/wiki).
  version: "2.0.0"
  title: Apostol CRM API
  contact:
    email: apostoldevel@gmail.com
  license:
    name: MIT License
    url: https://github.com/apostoldevel/apostol/blob/master/LICENSE
externalDocs:
  description: Wiki
  url: https://github.com/apostoldevel/db-platform/wiki
servers:
  - url: '{protocol}://api.example.com/api/v1'
    description: Apostol CRM
    variables:
      protocol:
        enum:
          - http
          - https
        default: https
  - url: 'http://localhost:{port}/api/v1'
    description: Local host
    variables:
      port:
        enum:
          - '8080'
          - '4977'
          - '3000'
        default: '8080'
tags:
  - name: Connection
    description: Server connectivity test.
  - name: Security
    description: Authentication and authorization.
  - name: Sign
    description: Sign up, sign in, sign out.
  - name: User
    description: User management and profiles.
  - name: Current
    description: Current session parameters.
  - name: Session
    description: Session management.
  - name: Locale
    description: Language and locale selection.
  - name: Workflow
    description: Entity, class, state, action, method, transition, event management.
  - name: Object
    description: Generic object CRUD, groups, links, files, data, addresses, geolocation.
  - name: Document
    description: Parameterized document endpoints (type, method, count, set, get, list).
  - name: Reference
    description: Parameterized reference endpoints (type, method, count, set, get, list).
  - name: Admin
    description: "Administrative operations: users, groups, areas, interfaces, sessions, logs."
  - name: Log
    description: Event logging.
  - name: Registry
    description: Hierarchical key-value configuration store.
  - name: Resource
    description: Multilingual resource tree.
  - name: File
    description: File management and object file attachments.
  - name: KLADR
    description: Russian address classifier (KLADR).
  - name: Notice
    description: System notices and user alerts.
  - name: Comment
    description: Hierarchical object comments.
  - name: Notification
    description: Real-time push notifications (FCM).
  - name: Verification
    description: Email and phone verification codes.
  - name: Observer
    description: Publisher/subscriber event system.
  - name: Replication
    description: Data replication between instances.
  - name: Report
    description: Report trees, forms, routines, and ready reports.
  - name: Search
    description: Global search.
  - name: Account
    description: Account-specific endpoints.
  - name: Card
    description: Payment card binding.
  - name: Client
    description: Client-specific endpoints.
  - name: Address
    description: Address-specific endpoints (tree, string).
  - name: Calendar
    description: Calendar and date management.
  - name: Device
    description: Device management.
  - name: Message
    description: Message inbox and outbox.
  - name: Model
    description: Model properties and data.
  - name: Tariff
    description: Tariff options and features.
  - name: Payment
    description: Payment processing (CloudPayments, YooKassa).
  - name: Member
    description: User group/area/interface membership.
paths:
  /ping:
    get:
      tags:
        - Connection
      summary: Check server connection.
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/response'
        '400':
          $ref: '#/components/responses/BadRequest'
        '5XX':
          $ref: '#/components/responses/InternalError'
  /time:
    get:
      tags:
        - Connection
      summary: Current server time.
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
                properties:
                  serverTime:
                    type: integer
                    description: UNIX time
                example:
                  serverTime: 1642521843938
        '400':
          $ref: '#/components/responses/BadRequest'
        '5XX':
          $ref: '#/components/responses/InternalError'
  /authenticate:
    post:
      tags:
        - Security
      summary: Authentication.
      operationId: authenticate
      parameters:
        - $ref: '#/components/parameters/resultObject'
        - $ref: '#/components/parameters/resultFormat'
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/authenticate'
          application/json:
            schema:
              $ref: '#/components/schemas/authenticate'
      responses:
        '200':
          description: Success.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '5XX':
          $ref: '#/components/responses/InternalError'
  /authorize:
    post:
      tags:
        - Security
      summary: Authorize.
      operationId: authorize
      parameters:
        - $ref: '#/components/parameters/resultObject'
        - $ref: '#/components/parameters/resultFormat'
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/authorize'
          application/json:
            schema:
              $ref: '#/components/schemas/authorize'
      responses:
        '200':
          description: Success.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '5XX':
          $ref: '#/components/responses/InternalError'
  /su:
    post:
      tags:
        - Security
      summary: Substitute user.
      operationId: su
      parameters:
        - $ref: '#/components/parameters/resultObject'
        - $ref: '#/components/parameters/resultFormat'
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/su'
          application/json:
            schema:
              $ref: '#/components/schemas/su'
      responses:
        '200':
          description: Success.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '5XX':
          $ref: '#/components/responses/InternalError'
  /search:
    post:
      tags:
        - Search
      summary: Search.
      operationId: search
      parameters:
        - $ref: '#/components/parameters/resultObject'
        - $ref: '#/components/parameters/resultFormat'
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                text:
                  type: string
                  description: Search text.
          application/json:
            schema:
              $ref: '#/components/schemas/search'
      responses:
        '200':
          description: Success.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '5XX':
          $ref: '#/components/responses/InternalError'
  /whoami:
    post:
      tags:
        - Common
      summary: Current user information.
      operationId: whoami
      parameters:
        - $ref: '#/components/parameters/resultObject'
        - $ref: '#/components/parameters/resultFormat'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/fields'
      responses:
        '200':
          description: Success.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '5XX':
          $ref: '#/components/responses/InternalError'
  /run:
    post:
      tags:
        - Common
      summary: Executes a REST JSON API request.
      operationId: run
      parameters:
        - $ref: '#/components/parameters/resultObject'
        - $ref: '#/components/parameters/resultFormat'
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/run'
          application/json:
            schema:
              $ref: '#/components/schemas/run'
      responses:
        '200':
          description: Success.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '5XX':
          $ref: '#/components/responses/InternalError'
  /locale:
    post:
      tags:
        - Common
      summary: Current locale.
      operationId: locale
      parameters:
        - $ref: '#/components/parameters/resultObject'
        - $ref: '#/components/parameters/resultFormat'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/fields'
      responses:
        '200':
          description: Success.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '5XX':
          $ref: '#/components/responses/InternalError'
  /entity:
    post:
      tags:
        - Common
      summary: Entityes.
      operationId: entity
      parameters:
        - $ref: '#/components/parameters/resultObject'
        - $ref: '#/components/parameters/resultFormat'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/fields'
      responses:
        '200':
          description: Success.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '5XX':
          $ref: '#/components/responses/InternalError'
  /type:
    post:
      tags:
        - Common
      summary: Type list.
      operationId: type
      parameters:
        - $ref: '#/components/parameters/resultObject'
        - $ref: '#/components/parameters/resultFormat'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/fields'
      responses:
        '200':
          description: Success.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '5XX':
          $ref: '#/components/responses/InternalError'
  /class:
    post:
      tags:
        - Common
      summary: Class tree.
      operationId: class
      parameters:
        - $ref: '#/components/parameters/resultObject'
        - $ref: '#/components/parameters/resultFormat'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/fields'
      responses:
        '200':
          description: Success.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '5XX':
          $ref: '#/components/responses/InternalError'
  /priority:
    post:
      tags:
        - Common
      summary: Priority list.
      operationId: priority
      parameters:
        - $ref: '#/components/parameters/resultObject'
        - $ref: '#/components/parameters/resultFormat'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/fields'
      responses:
        '200':
          description: Success.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '5XX':
          $ref: '#/components/responses/InternalError'
  /event/log/count:
    post:
      tags:
        - Log
      summary: Count of records.
      parameters:
        - $ref: '#/components/parameters/resultObject'
        - $ref: '#/components/parameters/resultFormat'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/list'
      responses:
        '200':
          $ref: '#/components/responses/Count'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '5XX':
          $ref: '#/components/responses/InternalError'
  /event/log/get:
    post:
      tags:
        - Log
      summary: Get event log record.
      parameters:
        - $ref: '#/components/parameters/resultObject'
        - $ref: '#/components/parameters/resultFormat'
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - id
              properties:
                id:
                  type: integer
                  format: int64
          application/json:
            schema:
              type: object
              required:
                - id
              properties:
                id:
                  type: integer
                  format: int64
                fields:
                  type: object
                  example: null
                  description: Field list.
      responses:
        '200':
          description: Success.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '5XX':
          $ref: '#/components/responses/InternalError'
  /event/log/list:
    post:
      tags:
        - Log
      summary: Returns event log entries as a list.
      parameters:
        - $ref: '#/components/parameters/resultObject'
        - $ref: '#/components/parameters/resultFormat'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/list'
      responses:
        '200':
          description: JSON-array.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '5XX':
          $ref: '#/components/responses/InternalError'
  /current/session:
    get:
      tags:
        - Current
      summary: Current session.
      parameters:
        - $ref: '#/components/parameters/resultObject'
        - $ref: '#/components/parameters/resultFormat'
      responses:
        '200':
          description: Success.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '5XX':
          $ref: '#/components/responses/InternalError'
  /current/user:
    get:
      tags:
        - Current
      summary: Current user profile.
      parameters:
        - $ref: '#/components/parameters/resultObject'
        - $ref: '#/components/parameters/resultFormat'
      responses:
        '200':
          description: Success.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '5XX':
          $ref: '#/components/responses/InternalError'
  /current/userid:
    get:
      tags:
        - Current
      summary: Current user ID.
      parameters:
        - $ref: '#/components/parameters/resultObject'
        - $ref: '#/components/parameters/resultFormat'
      responses:
        '200':
          description: Success.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '5XX':
          $ref: '#/components/responses/InternalError'
  /current/username:
    get:
      tags:
        - Current
      summary: Current username.
      parameters:
        - $ref: '#/components/parameters/resultObject'
        - $ref: '#/components/parameters/resultFormat'
      responses:
        '200':
          description: Success.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '5XX':
          $ref: '#/components/responses/InternalError'
  /current/area:
    get:
      tags:
        - Current
      summary: Current area.
      parameters:
        - $ref: '#/components/parameters/resultObject'
        - $ref: '#/components/parameters/resultFormat'
      responses:
        '200':
          description: Success.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '5XX':
          $ref: '#/components/responses/InternalError'
  /current/interface:
    get:
      tags:
        - Current
      summary: Current interface.
      parameters:
        - $ref: '#/components/parameters/resultObject'
        - $ref: '#/components/parameters/resultFormat'
      responses:
        '200':
          description: Success.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '5XX':
          $ref: '#/components/responses/InternalError'
  /current/locale:
    get:
      tags:
        - Current
      summary: Current locale.
      parameters:
        - $ref: '#/components/parameters/resultObject'
        - $ref: '#/components/parameters/resultFormat'
      responses:
        '200':
          description: Success.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '5XX':
          $ref: '#/components/responses/InternalError'
  /current/oper_date:
    get:
      tags:
        - Current
      summary: Current business day date.
      parameters:
        - $ref: '#/components/parameters/resultObject'
        - $ref: '#/components/parameters/resultFormat'
      responses:
        '200':
          description: Success.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '5XX':
          $ref: '#/components/responses/InternalError'
  /sign/in:
    post:
      tags:
        - Sign
      summary: Login with virtual username and password.
      description: >
        Requires preauthorization of the OAuth 2.0 client.
        The method is called by the authorization server at login.
        Calling a method directly will result in an error.
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/SignIn'
          application/json:
            schema:
              $ref: '#/components/schemas/SignIn'
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
                properties:
                  session:
                    type: string
                    description: Session code.
                  secret:
                    type: string
                    description: Secret key for HMAC-256 signing.
                  code:
                    type: string
                    description: One-time authorization code for obtaining a token, see OAuth 2.0.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '5XX':
          $ref: '#/components/responses/InternalError'
  /sign/up:
    post:
      tags:
        - Sign
      summary: Sign Up.
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - type
                - username
                - password
              properties:
                type:
                  type: string
                  enum: [entity, physical, individual]
                  example: physical
                username:
                  type: string
                password:
                  type: string
                phone:
                  type: string
                email:
                  type: string
                description:
                  type: string
          application/json:
            schema:
              type: object
              required:
                - type
                - username
                - password
              properties:
                type:
                  type: string
                  enum: [entity, physical, individual]
                  example: physical
                username:
                  type: string
                  example: username
                password:
                  type: string
                  example: password
                name:
                  type: object
                  properties:
                    name:
                      type: string
                      example: null
                    short:
                      type: string
                      example: null
                    first:
                      type: string
                      example: null
                    last:
                      type: string
                      example: null
                    middle:
                      type: string
                      example: null
                phone:
                  type: string
                  example: null
                email:
                  type: string
                  example: null
                profile:
                  type: object
                  properties:
                    locale:
                      type: string
                      format: uuid
                      example: null
                    area:
                      type: string
                      format: uuid
                      example: null
                    interface:
                      type: string
                      format: uuid
                      example: null
                    email_verified:
                      type: boolean
                      example: null
                    phone_verified:
                      type: boolean
                      example: null
                    picture:
                      type: string
                      example: null
                description:
                  type: string
                  example: null
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                    description: Client UUID
                  userid:
                    type: string
                    format: uuid
                    description: User UUID
                  uid:
                    type: string
                    description: Username (login)
                  secret:
                    type: string
                    description: User secret
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '5XX':
          $ref: '#/components/responses/InternalError'
  /sign/out:
    post:
      tags:
        - Sign
      summary: Sign Out.
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/SignOut'
          application/json:
            schema:
              $ref: '#/components/schemas/SignOut'
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                    description: Error message (if any).
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '5XX':
          $ref: '#/components/responses/InternalError'
  /user/password:
    post:
