components:
  parameters:
    document:
      in: path
      name: document
      description: Document entity
      required: true
      schema:
        type: string
        enum: [account, card, client, company, customer, device, employee, identity, invoice, job, message, order, payment, price, product, report_ready, subscription, tariff, task, transaction]
    reference:
      in: path
      name: reference
      description: Reference entity
      required: true
      schema:
        type: string
        enum: [address, agent, calendar, category, country, currency, form, format, measure, model, program, property, reference, region, report, report_form, report_routine, report_tree, scheduler, service, vendor, version]
    resultObject:
      in: query
      name: result_object
      required: false
      schema:
        type: string
        enum: [true, false]
      description: Wrap the result in a JSON-object named "result".
    resultFormat:
      in: query
      name: result_format
      required: false
      schema:
        type: string
        enum: [object, array, null]
      description: >
        All endpoints are returned: JSON-object or JSON-array depending on the number of entries in the response.
        You can change this behavior with this setting.
  responses:
    Ok:
      description: OK!
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ok'
    Count:
      description: Count of records.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/count'
    GetObject:
      description: Object
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/getObject'
    GetDocument:
      description: Document
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/getDocument'
    GetReference:
      description: Reference
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/getReference'
    ListObject:
      description: List of objects.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/listObject'
    ListDocument:
      description: List of documents.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/listDocument'
    ListReference:
      description: List of references.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/listReference'
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/error'
    NotFound:
      description: The specified resource was not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/error'
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/error'
    InternalError:
      description: Internal error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/error'
  schemas:
    ok:
      type: object
      required:
        - ok
      properties:
        ok:
          type: boolean
    authenticate:
      type: object
      required:
        - session
        - secret
      properties:
        session:
          type: string
          description: Session code.
        secret:
          type: string
          description: Secret code.
    authorize:
      type: object
      required:
        - session
      properties:
        session:
          type: string
          description: Session code.
    su:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          description: Username for substitution.
        password:
          type: string
          description: Password of the current user.
    fields:
      type: object
      properties:
        fields:
          type: object
          example: null
          description: Field array.
    search:
      type: object
      required:
        - text
      properties:
        text:
          type: string
          description: Search text.
        entities:
          type: object
          example: null
          description: Entities array.
        fields:
          type: object
          example: null
          description: Field array.
    run:
      type: object
      required:
        - key
        - path
      properties:
        key:
          type: string
          description: Key.
        method:
          type: string
          enum: [GET, POST]
          default: POST
          description: Method.
        path:
          type: string
          description: The path to the endpoint.
        payload:
          type: object
          example: null
          description: Payload.
    type:
      type: object
      properties:
        id:
          type: string
          format: uuid
        entity:
          type: string
          format: uuid
        entitycode:
          type: string
        entityname:
          type: string
        class:
          type: string
          format: uuid
        classcode:
          type: string
        classlabel:
          type: string
        code:
          type: string
        name:
          type: string
        description:
          type: string
    method:
      type: object
      properties:
        id:
          type: string
          format: uuid
        parent:
          type: string
          format: uuid
          example: null
        entity:
          type: string
          format: uuid
        entitycode:
          type: string
        entityname:
          type: string
        class:
          type: string
          format: uuid
        classcode:
          type: string
        classlabel:
          type: string
        state:
          type: string
          format: uuid
        statecode:
          type: string
        statelabel:
          type: string
        action:
          type: string
          format: uuid
        actioncode:
          type: string
        actionname:
          type: string
        code:
          type: string
        label:
          type: string
        sequence:
          type: integer
        visible:
          type: boolean
    methodId:
      type: object
      required:
        - id
      properties:
        id:
          type: string
          format: uuid
    getObject:
      type: object
      properties:
        id:
          type: string
          format: uuid
        parent:
          type: string
          format: uuid
        entity:
          type: string
          format: uuid
        entitycode:
          type: string
        entityname:
          type: string
        entitydescription:
          type: string
        class:
          type: string
          format: uuid
        classcode:
          type: string
        classlabel:
          type: string
        type:
          type: string
          format: uuid
        typecode:
          type: string
        typename:
          type: string
        typedescription:
          type: string
        label:
          type: string
        statetype:
          type: string
          format: uuid
        statetypecode:
          type: string
        statetypename:
          type: string
        state:
          type: string
          format: uuid
        statecode:
          type: string
        statelabel:
          type: string
        lastupdate:
          type: string
          format: date-time
        owner:
          type: string
          format: uuid
        ownercode:
          type: string
        ownername:
          type: string
        created:
          type: string
          format: date-time
        oper:
          type: string
          format: uuid
        opercode:
          type: string
        opername:
          type: string
        operdate:
          type: string
          format: date-time
        scope:
          type: string
          format: uuid
        scopecode:
          type: string
        scopename:
          type: string
        scopedescription:
          type: string
    getDocument:
      allOf:
        - $ref: '#/components/schemas/getObject'
        - type: object
          properties:
            area:
              type: string
              format: uuid
            areacode:
              type: string
            areaname:
              type: string
            areadescription:
              type: string
    getReference:
      allOf:
        - $ref: '#/components/schemas/getObject'
        - type: object
          properties:
            code:
              type: string
            name:
              type: string
            description:
              type: string
    getFile:
      allOf:
        - $ref: '#/components/schemas/getObject'
        - type: object
          properties:
            code:
              type: string
            name:
              type: string
            description:
              type: string
    listObject:
      type: array
      description: List of objects.
      items:
        $ref: '#/components/schemas/getObject'
    listDocument:
      type: array
      description: List of documents.
      items:
        $ref: '#/components/schemas/getDocument'
    listReference:
      type: array
      description: List of references.
      items:
        $ref: '#/components/schemas/getReference'
    listFile:
      type: array
      description: Files.
      items:
        $ref: '#/components/schemas/getFile'
    set:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: null
        type:
          type: string
          format: uuid
          example: null
    get_form:
      type: object
      required:
        - id
      properties:
        id:
          type: string
          format: uuid
    get_json:
      type: object
      required:
        - id
      properties:
        id:
          type: string
          format: uuid
        fields:
          type: object
          example: null
          description: Field list.
    SignIn:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          description: Username or personal code.
        password:
          type: string
          description: Password. If `username` is a personal code, then pass the SHA1(secret) hash of the user's secret code to `password`.
        agent:
          type: string
          description: Ignored. User agent (browser). The value is set by the system.
        host:
          type: string
          format: ipv4
          description: Ignored. IP address. The value is set by the system.
    SignOut:
      type: object
      properties:
        session:
          type: string
          description: Session code.
        closeall:
          type: boolean
          description: Close all sessions.
    list:
      type: object
      properties:
        fields:
          type: object
          description: List of fields. If not specified, will return all available fields.
          example: >
            ["field1", "field2", "field3"]
        search:
          type: object
          properties:
            condition:
              type: string
              enum: [AND, OR]
              default: AND
              description: Condition.
            field:
              type: string
              description: The name of the field to which the condition applies.
            compare:
              type: string
              enum: [EQL, NEQ, LSS, LEQ, GTR, GEQ, GIN, AND, OR, XOR, NOT, ISN, INN, LKE, IKE, SIM, PSX, PSI, PSN, PIN]
              default: EQL
              description: Comparison.
            value:
              type: string
              description: The name of the field to which the condition applies.
            valarr:
              type: object
              description: Lookup values, specified as an array. If the valarr key is specified, then the `compare` and `value` keys are ignored.
            lstr:
              type: string
              description: Left parenthesis.
            rstr:
              type: string
              description: Right parenthesis.
          description: Conditions for data selection.
          example: >
            [{"field": "apartment", "compare": "GEQ", "value": "5"}]
        filter:
          type: object
          description: Filter for selecting data in the form of a key/value pair. The key is the name of the field. filter is a short form of search.
          example: >
            {"object": "00000000-0000-4000-a000-000000000000", "code": "default"}
        reclimit:
          type: integer
          description: >
            Returns no more than the specified number of rows (may be less if the query itself returned fewer rows). To make reclimit publicly available, you must pass a value <= 0. To send /endpoint/count, the reclimit: 0 condition is made automatically.
          default: 500
        recoffset:
          type: integer
          description: Skips the specified number of rows in the query.
        orderby:
          type: object
          description: Sort order (array of fields). ASC and DESC are allowed.
          example: >
            ["field1", "field2 ASC", "field3 DESC"]
      example: {"reclimit": 50}
      description: Query.
    response:
      type: object
      required:
        - code
        - message
      properties:
        error:
          type: object
          properties:
            code:
              type: integer
              format: int32
            message:
              type: string
    count:
      type: object
      properties:
        count:
          type: integer
          format: int32
          example: 0
    error:
      type: object
      required:
        - code
        - message
      properties:
        error:
          type: object
          properties:
            code:
              type: integer
              format: int32
            message:
              type: string
  securitySchemes:
    oauth2:
      type: oauth2
      description: >
        This API uses OAuth 2 with the implicit grant flow.
        [More info](https://github.com/apostoldevel/module-AuthServer).
      flows:
        password:
          tokenUrl: /oauth2/token
          scopes:
            example: default
        implicit:
          authorizationUrl: /oauth2/authorize
          scopes:
            example: default
security:
  - oauth2:
      - apostol
