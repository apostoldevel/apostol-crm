server {
    listen 80;
#    listen 443 ssl;

    server_name ws.example.com;

    access_log  /var/log/nginx/ws_access.log;
    error_log   /var/log/nginx/ws_error.log;

#    ssl_certificate /etc/letsencrypt/live/ws.example.com/fullchain.pem; # managed by Certbot
#    ssl_certificate_key /etc/letsencrypt/live/ws.example.com/privkey.pem; # managed by Certbot

#    include /etc/letsencrypt/options-ssl-nginx.conf;
#    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

#    ssl_stapling off;

    client_max_body_size       10m;
    client_body_buffer_size    128k;

    client_body_temp_path      /var/nginx/client_body_temp;

    proxy_connect_timeout      70;
    proxy_send_timeout         90;
    proxy_read_timeout         90;

    proxy_buffering            on;
    proxy_buffer_size          4k;
    proxy_buffers              4 32k;
    proxy_busy_buffers_size    64k;
    proxy_temp_file_write_size 64k;

    proxy_temp_path            /var/nginx/proxy_temp;

    location ^~ /ws/ {
        proxy_pass http://backend:4977;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    location / {
        proxy_pass http://backend:4977;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

}
