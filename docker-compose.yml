name: 'apostol-crm'

services:

  nginx:
    build: ./.docker/nginx-certbot
    container_name: nginx
    hostname: dev.example.com
    networks:
      - wan-network
      - lan-network
    ports:
      - "8080:80"
#      - "443:443"
    depends_on:
      - backend
      - pgweb
    restart: unless-stopped
    volumes:
      - letsencrypt:/etc/letsencrypt

  postgres:
    build:
      context: .
      dockerfile: ./.docker/postgres/Dockerfile
    container_name: postgres
    networks:
      - db-network
    ports:
      - "5431:5432"
    restart: unless-stopped
    env_file: ./.docker/postgres/.env
    volumes:
      - postgresql:/var/lib/postgresql
    healthcheck:
      test: ['CMD', 'pg_isready', '-U', 'postgres']
      interval: 10s
      timeout: 5s
      retries: 3

  pgbouncer:
    build: ./.docker/pgbouncer
    container_name: pgbouncer
    networks:
      - db-network
    restart: unless-stopped
    depends_on:
      - postgres
    env_file: ./.docker/pgbouncer/.env
    healthcheck:
      test: ['CMD', 'pg_isready', '-h', 'pgbouncer', '-p', '6432']
      interval: 10s
      timeout: 5s
      retries: 3

  pgweb:
    build: ./.docker/pgweb
    container_name: pgweb
    restart: unless-stopped
    networks:
      - lan-network
      - db-network
    ports:
      - "8081:8081"
    env_file: ./.docker/pgweb/.env
    depends_on:
      - postgres

  backend:
    build: .
    container_name: backend
    networks:
      - lan-network
      - db-network
    ports:
      - "8082:4977"
    restart: unless-stopped
    env_file: .env
    volumes:
      - file:/var/lib/apostol-crm
      - tmp:/tmp/apostol-crm
    depends_on:
      - pgbouncer

